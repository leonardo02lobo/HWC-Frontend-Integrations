services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: HelloWorldCup2026Frontend
    ports:
      - "4321:4321"
    volumes:
      - node_modules_volume:/app/node_modules_volumes
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USERPOLLING=true
    command: npm run dev -- --host 0.0.0.0
    stdin_open: true
    tty: true

volumes:
  node_modules_volume:
    name: HelloWorldCup2026Frontend-node-modules